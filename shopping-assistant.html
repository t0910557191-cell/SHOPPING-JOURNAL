<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>採購手帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --gold: #b8965a;
    --gold-light: #d4b07a;
    --gold-pale: #e8d5b0;
    --dark: #2a2218;
    --mid: #5a4e3c;
    --light: #8a7d68;
    --divider: #ddd5c0;
    --status-buy: #7a9e7e;
    --status-bought: #4a7a8a;
    --status-pass: #b07a7a;
    --status-catalog: #9a7aaa;
    --accent: #c4956a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  .header {
    background: var(--dark);
    color: var(--gold-pale);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 4px;
    color: var(--gold-light);
  }
  .header-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--light);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
  }
  .btn-icon {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(184,150,90,0.3);
    color: var(--gold-light);
    padding: 6px 12px;
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    transition: all 0.2s;
  }
  .btn-icon:hover { background: rgba(184,150,90,0.2); }

  /* ── Tab nav ── */
  .tab-nav {
    background: var(--dark);
    border-bottom: 1px solid rgba(184,150,90,0.2);
    display: flex;
    padding: 0 20px;
    gap: 0;
  }
  .tab {
    padding: 10px 18px;
    font-size: 14px;
    letter-spacing: 1.5px;
    color: var(--light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
  }

  /* ── Main content ── */
  .page { display: none; padding: 0 0 80px; }
  .page.active { display: block; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 20px;
    width: 52px;
    height: 52px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(184,150,90,0.4);
    border: none;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 90;
  }
  .fab:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(184,150,90,0.5); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(30,24,16,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--warm-white);
    width: 100%;
    max-height: 92vh;
    border-radius: 12px 12px 0 0;
    overflow-y: auto;
    padding: 20px 20px 40px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--divider);
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--dark);
    letter-spacing: 2px;
  }
  .modal-close {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--light);
    cursor: pointer;
    padding: 4px 8px;
  }

  /* ── Form ── */
  .form-section {
    margin-bottom: 18px;
  }
  .form-label {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--light);
    margin-bottom: 6px;
    display: block;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--cream);
    border: 1px solid var(--divider);
    border-radius: 3px;
    padding: 10px 12px;
    font-size: 14px;
    color: var(--dark);
    font-family: 'Noto Serif TC', serif;
    font-weight: 300;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--gold);
  }
  .form-textarea { resize: vertical; min-height: 60px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .form-row-3 {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 8px;
  }

  /* Price row with TWD hint */
  .price-wrap { position: relative; }
  .price-hint {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--gold);
    pointer-events: none;
    font-style: italic;
  }

  /* Toggle buttons */
  .toggle-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .toggle-btn {
    padding: 7px 14px;
    border: 1px solid var(--divider);
    border-radius: 2px;
    font-size: 12px;
    font-family: 'Noto Serif TC', serif;
    background: transparent;
    color: var(--mid);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .toggle-btn.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--gold-pale);
  }

  /* Photo area */
  .photo-area {
    border: 1.5px dashed var(--divider);
    border-radius: 4px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
    display: block;
  }
  .photo-area:hover { border-color: var(--gold); }
  .photo-preview {
    width: 100%;
    max-height: 160px;
    object-fit: contain;
    border-radius: 2px;
  }
  .photo-placeholder {
    color: var(--light);
    font-size: 12px;
    letter-spacing: 1.5px;
  }
  .photo-icon { font-size: 28px; margin-bottom: 6px; }

  /* Discount section */
  .discount-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }
  .discount-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .discount-toggle input { display: none; }
  .discount-dot {
    width: 16px;
    height: 16px;
    border: 1.5px solid var(--divider);
    border-radius: 50%;
    background: transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .discount-toggle input:checked ~ .discount-dot {
    background: var(--gold);
    border-color: var(--gold);
  }
  .discount-label { font-size: 12px; color: var(--mid); letter-spacing: 1px; }

  /* Save button */
  .btn-save {
    width: 100%;
    background: var(--dark);
    color: var(--gold-pale);
    border: none;
    padding: 14px;
    font-size: 12px;
    letter-spacing: 4px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    border-radius: 3px;
    transition: background 0.2s;
    margin-top: 6px;
  }
  .btn-save:hover { background: #3d3020; }

  /* ── Records ── */
  .filter-bar {
    padding: 12px 16px;
    background: var(--warm-white);
    border-bottom: 1px solid var(--divider);
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 5px 12px;
    border: 1px solid var(--divider);
    border-radius: 20px;
    font-size: 11px;
    letter-spacing: 1.5px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    background: transparent;
    color: var(--mid);
    font-family: 'Noto Serif TC', serif;
  }
  .filter-chip.active {
    background: var(--dark);
    border-color: var(--dark);
    color: var(--gold-pale);
  }

  .record-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

  .record-card {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-radius: 4px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .record-card:hover { box-shadow: 0 2px 12px rgba(42,34,24,0.1); }

  .record-top {
    display: flex;
    gap: 12px;
    padding: 12px;
  }
  .record-thumb {
    width: 64px;
    height: 64px;
    object-fit: cover;
    border-radius: 2px;
    flex-shrink: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    color: var(--divider);
  }
  .record-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 2px; }

  /* ── Card redesign ── */
  .card-header {
    display: flex;
    gap: 12px;
    padding: 12px 12px 8px;
    align-items: flex-start;
  }
  .card-thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: var(--divider);
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .card-thumb-empty { border: 1px dashed var(--divider); }
  .card-header-info { flex: 1; min-width: 0; }
  .card-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 11px;
    color: var(--light);
    letter-spacing: 0.3px;
  }
  .card-body {
    padding: 0 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    border-bottom: 1px solid var(--divider);
  }
  /* card data rows — label col fixed width for alignment */
  .card-data-grid {
    display: grid;
    grid-template-columns: 28px 1fr;
    align-items: baseline;
    gap: 4px 6px;
    font-size: 13px;
  }
  .card-lbl {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--light);
    text-align: right;
  }
  .card-val { color: var(--dark); }
  .card-val-strike { color: var(--light); text-decoration: line-through; font-size: 12px; }
  .card-disc-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    color: var(--dark);
    line-height: 1;
  }
  .card-twd {
    font-size: 11px;
    color: var(--gold);
    margin-left: 5px;
  }
  .card-short {
    display: inline-block;
    background: var(--status-pass);
    color: white;
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .card-margin-pill {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 10px;
    border: 1px solid currentColor;
    margin-top: 2px;
  }
  /* info box: name + tags + note */
  .card-info-box {
    margin: 0 12px 8px;
    background: var(--cream);
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .card-tags-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  /* status row */
  .card-status-bar {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--divider);
  }
  .card-status-bar .status-btn { flex: 1; text-align: center; }
  /* top-right edit/delete */
  .card-top-actions {
    display: flex;
    gap: 4px;
    align-items: flex-start;
    margin-left: auto;
    flex-shrink: 0;
  }
  .btn-edit-icon, .btn-del-icon {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    font-family: 'Noto Serif TC', serif;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    height: 28px;
    display: flex;
    align-items: center;
  }
  .btn-edit-icon { color: var(--mid); }
  .btn-edit-icon:hover { border-color: var(--gold); color: var(--gold); }
  .btn-del-icon { color: var(--status-pass); }
  .btn-del-icon:hover { background: var(--status-pass); color: white; border-color: var(--status-pass); }
  .card-footer-actions {
    border-top: 1px solid var(--divider);
    padding: 6px 12px;
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }
  /* legacy compat */
  .record-body { flex: 1; min-width: 0; }
  .record-name { font-size: 14px; color: var(--dark); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .record-meta { font-size: 12px; color: var(--light); letter-spacing: 0.5px; margin-bottom: 4px; }
  .record-price { font-family: 'Cormorant Garamond', serif; font-size: 17px; color: var(--dark); margin-bottom: 3px; }
  .record-price-twd { font-size: 12px; color: var(--gold); margin-left: 4px; }
  .record-biz-line { font-size: 12px; color: var(--light); display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .thumb-wrap { flex-shrink: 0; text-align: center; }

  .record-tags {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 0 12px 10px;
  }
  .tag {
    padding: 3px 8px;
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  .tag-cat { background: var(--cream); color: var(--mid); border: 1px solid var(--divider); }
  .tag-note { background: var(--warm-white); color: var(--mid); border: 1px solid var(--divider); max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tag-biz { background: #e8ede8; color: #4a6a4a; }
  .tag-personal { background: #ede8ec; color: #6a4a68; }
  .tag-discount { background: #fdf3e3; color: var(--accent); border: 1px solid var(--gold-pale); }
  .tag-catalog { background: #f0edf5; color: var(--status-catalog); }

  .record-bottom {
    border-top: 1px solid var(--divider);
    padding: 8px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .status-btns { display: flex; gap: 4px; }
  .status-btn {
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--divider);
    background: transparent;
    color: var(--light);
    font-family: 'Noto Serif TC', serif;
    transition: all 0.15s;
  }
  .status-btn.s-buy.active { background: var(--status-buy); border-color: var(--status-buy); color: white; }
  .status-btn.s-bought.active { background: var(--status-bought); border-color: var(--status-bought); color: white; }
  .status-btn.s-pass.active { background: var(--status-pass); border-color: var(--status-pass); color: white; }
  .status-btn.s-catalog.active { background: var(--status-catalog); border-color: var(--status-catalog); color: white; }

  .card-status-row {
    display: flex;
    gap: 5px;
    margin-top: 7px;
  }

  .record-action-btns { display: flex; gap: 6px; }
  .rec-btn {
    background: none;
    border: 1px solid var(--divider);
    color: var(--light);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 2px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    transition: all 0.15s;
  }
  .rec-btn:hover { border-color: var(--gold); color: var(--gold); }
  .rec-btn.danger:hover { border-color: var(--status-pass); color: var(--status-pass); }

  /* ── Summary page ── */
  .summary-section { padding: 16px; }
  .summary-card {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .summary-card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    letter-spacing: 3px;
    color: var(--mid);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--divider);
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 5px 0;
    font-size: 13px;
    border-bottom: 1px dotted var(--divider);
  }
  .summary-row:last-child { border: none; }
  .summary-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--dark);
  }

  /* ── Settings page ── */
  .settings-section { padding: 16px; }
  .settings-group {
    background: var(--warm-white);
    border: 1px solid var(--divider);
    border-radius: 4px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .settings-group-title {
    padding: 12px 16px;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--light);
    background: var(--cream);
    border-bottom: 1px solid var(--divider);
  }
  .settings-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--divider);
  }
  .settings-row:last-child { border: none; }
  .settings-row-label { font-size: 13px; color: var(--dark); }
  .settings-input-sm {
    background: var(--cream);
    border: 1px solid var(--divider);
    border-radius: 2px;
    padding: 6px 10px;
    font-size: 14px;
    color: var(--dark);
    font-family: 'Noto Serif TC', serif;
    width: 90px;
    text-align: right;
  }
  .settings-input-sm:focus { outline: none; border-color: var(--gold); }

  .btn-export {
    width: 100%;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 12px;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: 'Noto Serif TC', serif;
    border-radius: 3px;
    transition: all 0.2s;
    margin-bottom: 8px;
  }
  .btn-export:hover { background: var(--gold); color: white; }

  /* Batch currency modal */
  .batch-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--divider);
    font-size: 13px;
  }
  .batch-item:last-child { border: none; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--light);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 13px; letter-spacing: 2px; }

  /* toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: var(--gold-pale);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Scroll area for catalog to purchase */
  .catalog-convert-btn {
    font-size: 10px;
    padding: 3px 8px;
    letter-spacing: 1px;
  }

  /* Note line under thumb */
  .record-note-line {
    font-size: 11px;
    color: var(--light);
    font-style: italic;
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 64px;
    text-align: center;
  }

  /* Business calc fields */
  .calc-hint {
    font-size: 11px;
    color: var(--gold);
    margin-top: 4px;
    font-style: italic;
    letter-spacing: 0.5px;
  }
  .margin-positive { color: var(--status-buy); }
  .margin-negative { color: var(--status-pass); }

  /* Sort/filter panel */
  .sort-bar {
    background: var(--warm-white);
    border-bottom: 1px solid var(--divider);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .sort-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--light);

<!-- Tab nav -->

  <div class="tab" onclick="switchTab('catalog')">目錄</div>
  <div class="tab" onclick="switchTab('summary')">統計</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>

<!-- Records page -->
<div id="page-records" class="page active">
  <div class="filter-bar">
    <button class="filter-chip active" onclick="setFilter('all', this)">全部</button>
    <button class="filter-chip" onclick="setFilter('buy', this)">要買</button>

    <button class="filter-chip" onclick="setFilter('pass', this)">放棄</button>
    <button class="filter-chip" onclick="setFilter('biz', this)">業務</button>
    <button class="filter-chip" onclick="setFilter('personal', this)">私人</button>
  </div>
  <div class="sort-bar">
    <span class="sort-label">篩選</span>
    <select class="sort-select" id="filter-country" onchange="renderRecords()">
      <option value="">所有國家</option>
    </select>
    <select class="sort-select" id="filter-city" onchange="renderRecords()">
      <option value="">所有城市</option>
    </select>
    <select class="sort-select" id="filter-store" onchange="renderRecords()">
      <option value="">所有店名</option>
    </select>
    <span class="sort-label">排序</span>
    <select class="sort-select" id="sort-field-records" onchange="renderRecords()">
      <option value="date">日期</option>
      <option value="price">採購成本</option>
      <option value="margin">毛利率</option>
      <option value="qty">數量</option>
      <option value="shipping">運費</option>
    </select>
    <button class="sort-dir desc" id="sort-dir-records" onclick="toggleSortDir('records')"></button>
  </div>
  <div id="record-list" class="record-list">
    <div class="empty-state">
      <div class="empty-icon">✦</div>
      <div class="empty-text">點擊 + 開始記錄</div>

  </div>
</div>

<!-- Catalog page -->

<script>
// ── IndexedDB setup ──
const DB_NAME = 'shopping-journal';
const DB_VERSION = 1;
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('records')) {
        d.createObjectStore('records', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('photos')) {
        d.createObjectStore('photos', { keyPath: 'id' });
      }
      if (!d.objectStoreNames.contains('settings')) {
        d.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    req.onsuccess = e => { db = e.target.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbPut(store, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbGet(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbGetAll(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbDelete(store, key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function dbClear(store) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).clear();
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

// ── App state ──
let records = [];
let rates = { EUR: 35, RMB: 4.5, JPY: 0.22, KRW: 0.024, USD: 32, TWD: 1 };
let currentFilter = 'all';
let photoData = null;
let photoBlob = null;
let batchSelections = {};
let sortDirs = { records: 'desc', catalog: 'desc' };

async function saveData() {
  // Save all records (without photo) to IndexedDB records store
  for (const r of records) {
    const recNoPhoto = { ...r };
    delete recNoPhoto.photo; // don't store photo in records store
    await dbPut('records', recNoPhoto);
  }
}

async function saveRecord_db(rec, blob) {
  const recNoPhoto = { ...rec };
  delete recNoPhoto.photo;
  await dbPut('records', recNoPhoto);
  if (blob) {
    await dbPut('photos', { id: rec.id, blob });
  }
}

async function deleteRecord_db(id) {
  await dbDelete('records', id);
  await dbDelete('photos', id);
}

async function loadAllRecords() {
  const recs = await dbGetAll('records');
  const photos = await dbGetAll('photos');
  const photoMap = {};
  photos.forEach(p => {
    photoMap[p.id] = URL.createObjectURL(p.blob);
  });
  records = recs.map(r => ({ ...r, photo: photoMap[r.id] || null }));
  // sort newest first
  records.sort((a, b) => (b.id > a.id ? 1 : -1));
}

async function saveRates() {
  rates.EUR = parseFloat(document.getElementById('rate-EUR').value) || 35;
  rates.RMB = parseFloat(document.getElementById('rate-RMB').value) || 4.5;

  rates.KRW = parseFloat(document.getElementById('rate-KRW').value) || 0.024;
  rates.USD = parseFloat(document.getElementById('rate-USD').value) || 32;

}

function openAddModal(editId = null) {
  clearForm();

    document.getElementById('f-city').value = rec.city || '';
    document.getElementById('f-store').value = rec.store || '';
    document.getElementById('f-category').value = rec.category || '';
    document.getElementById('f-type').value = rec.type || '';
    document.getElementById('f-mode').value = rec.mode || '採購紀錄';
    document.getElementById('f-note').value = rec.note || '';
    document.getElementById('f-qty').value = rec.qty || '';
    document.getElementById('f-demand-qty').value = rec.demandQty || '';
    document.getElementById('f-sell-price').value = rec.sellPrice || '';
    document.getElementById('f-sell-currency').value = rec.sellCurrency || '';
    document.getElementById('f-shipping').value = rec.shipping || '';
    document.getElementById('f-shipping-in-cost').checked = rec.shippingInCost || false;
    // Set date - convert zh-TW format back to input[type=date] format if needed
    if (rec.date) {
      // Try to parse zh-TW date like 114/5/20 or standard yyyy/mm/dd
      let d = rec.date.replace(/\//g, '-');
      // If year < 1000 it's ROC calendar, convert to AD
      const parts = d.split('-');
      if (parts.length === 3 && parseInt(parts[0]) < 200) {
        d = (parseInt(parts[0]) + 1911) + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0');
      }
      document.getElementById('f-date').value = d;
    } else {
      document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
    }
    if (rec.hasDiscount) {
      document.getElementById('f-has-discount').checked = true;
      document.getElementById('discount-fields').style.display = 'block';
      document.getElementById('f-discount-price').value = rec.discountPrice || '';
      document.getElementById('f-discount-note').value = rec.discountNote || '';
    }
    if (rec.photo) {
      document.getElementById('photo-preview').src = rec.photo;
      document.getElementById('photo-preview').style.display = 'block';
      document.getElementById('photo-placeholder').style.display = 'none';
      photoData = rec.photo;
      photoBlob = null; // already saved, no new blob
    }
    restoreToggle('cat-group', rec.category);
    restoreToggle('type-group', rec.type);
    restoreToggle('mode-group', rec.mode);
    updateTwdHint();
  } else {
    document.getElementById('modal-title-text').textContent = '新增紀錄';
    document.querySelector('#mode-group .toggle-btn').classList.add('active');
    document.getElementById('f-country').value = '';
  document.getElementById('f-mode').value = '採購紀錄';
  document.getElementById('f-shipping-in-cost').checked = false;
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  }
  document.getElementById('add-modal').classList.add('open');
}

  if (!value) return;
  const btns = document.querySelectorAll('#' + groupId + ' .toggle-btn');

function clearForm() {
  ['f-name','f-price','f-currency','f-city','f-store','f-category','f-type','f-note','f-edit-id','f-discount-price','f-discount-note','f-qty','f-demand-qty','f-sell-price','f-shipping','f-date'].forEach(id => {

}

}

function toTWD(price, currency) {
  if (!price || !currency || !rates[currency]) return null;
  return Math.round(parseFloat(price) * rates[currency]);
}

function updateTwdHint() {
  const price = document.getElementById('f-price').value;
  const cur = document.getElementById('f-currency').value;
  const twd = toTWD(price, cur);
  document.getElementById('twd-hint').textContent = twd && cur !== 'TWD' ? `≈ NT$${twd.toLocaleString()}` : '';
  // Update labels and hints when buy currency changes
  const curLabel = cur || 'TWD';
  const shipLabel = document.getElementById('shipping-label');
  if (shipLabel) shipLabel.textContent = `運費 ${curLabel}（選填）`;
  const shipInput = document.getElementById('f-shipping');
  if (shipInput) shipInput.placeholder = `運費（${curLabel}，選填）`;
  updateMargin();
}

function updateDiscountHint() {
  const price = document.getElementById('f-discount-price').value;
  const cur = document.getElementById('f-currency').value;
  const twd = toTWD(price, cur);
  document.getElementById('discount-hint').textContent = twd && cur !== 'TWD' ? `≈ NT$${twd.toLocaleString()}` : '';
}

function calcMargin(r) {
  if (!r.price || !r.sellPrice) return null;
  const qty = parseFloat(r.qty) || 1;
  const buyRate = rates[r.currency] || 1;
  const sellRate = rates[r.sellCurrency] || 1;
  const costTWD = parseFloat(r.price) * buyRate;
  const shippingTWD = r.shippingInCost ? (parseFloat(r.shipping) || 0) * buyRate / qty : 0;
  const costPerUnitTWD = costTWD + shippingTWD;
  const sellPerUnitTWD = parseFloat(r.sellPrice) * sellRate;
  if (sellPerUnitTWD === 0) return null;
  return Math.round((sellPerUnitTWD - costPerUnitTWD) / sellPerUnitTWD * 100);
}

function calcDiscountMargin(r) {
  if (!r.discountPrice || !r.hasDiscount || !r.sellPrice) return null;
  const qty = parseFloat(r.qty) || 1;
  const buyRate = rates[r.currency] || 1;
  const sellRate = rates[r.sellCurrency] || 1;
  const discCostTWD = parseFloat(r.discountPrice) * buyRate;
  const shippingTWD = r.shippingInCost ? (parseFloat(r.shipping) || 0) * buyRate / qty : 0;
  const costPerUnitTWD = discCostTWD + shippingTWD;
  const sellPerUnitTWD = parseFloat(r.sellPrice) * sellRate;
  if (sellPerUnitTWD === 0) return null;
  return Math.round((sellPerUnitTWD - costPerUnitTWD) / sellPerUnitTWD * 100);
}

function calcMarginTWD(r) {
  // Returns profit in TWD for summary
  if (!r.price || !r.currency || !r.sellPrice) return null;
  const qty = parseFloat(r.qty) || 1;
  const costTWD = toTWD(r.price, r.currency) * qty;
  const shippingCost = r.shippingInCost ? (parseFloat(r.shipping) || 0) * rates[r.currency] : 0;
  const sellTWD = toTWD(r.sellPrice, r.currency) * qty;
  return sellTWD - costTWD - shippingCost;
}

function updateMargin() {
  const buyCur = document.getElementById('f-currency').value;
  const sellCur = document.getElementById('f-sell-currency').value;
  const price = parseFloat(document.getElementById('f-price').value);
  const qty = parseFloat(document.getElementById('f-qty').value) || 1;
  const sellPrice = parseFloat(document.getElementById('f-sell-price').value);
  const shipping = parseFloat(document.getElementById('f-shipping').value) || 0;
  const shippingInCost = document.getElementById('f-shipping-in-cost').checked;
  const hasDiscount = document.getElementById('f-has-discount').checked;
  const discountPrice = parseFloat(document.getElementById('f-discount-price').value);
  const hint = document.getElementById('margin-hint');

  // Update TWD hints for shipping and sell price
  const shippingEl = document.getElementById('shipping-hint');
  const sellEl = document.getElementById('sell-hint');
  if (shippingEl) {
    const shippingTwd = shipping && buyCur && buyCur !== 'TWD' ? Math.round(shipping * (rates[buyCur] || 1)) : null;
    shippingEl.textContent = shippingTwd ? `≈ NT$${shippingTwd.toLocaleString()}` : '';
  }
  if (sellEl) {
    const sellTwd = sellPrice && sellCur && sellCur !== 'TWD' ? Math.round(sellPrice * (rates[sellCur] || 1)) : null;
    sellEl.textContent = sellTwd ? `≈ NT$${sellTwd.toLocaleString()}` : '';
  }

  if (!price || !sellPrice) { hint.innerHTML = ''; return; }

  // Convert everything to TWD for cross-currency comparison
  const buyRate = rates[buyCur] || 1;
  const sellRate = rates[sellCur] || 1;
  const shippingRate = rates[buyCur] || 1; // shipping in buy currency

  const costTWD = price * buyRate;
  const shippingTWD = shippingInCost ? (shipping / qty) * shippingRate : 0;
  const costPerUnitTWD = costTWD + shippingTWD;
  const sellPerUnitTWD = sellPrice * sellRate;

  function marginLine(costTWDper, sellTWDper, buyCurLabel, sellCurLabel, label) {
    if (!sellTWDper) return '';
    const m = Math.round((sellTWDper - costTWDper) / sellTWDper * 100);
    const profitPerUnit = sellTWDper - costTWDper;
    const profitTotal = profitPerUnit * qty;
    const cls = m >= 0 ? 'margin-positive' : 'margin-negative';
    const sameRate = buyRate === sellRate;
    return `<div style="margin-top:4px;line-height:1.6">`
      + `${label}<span class="${cls}"><strong>${m}%</strong></span>`
      + `　獲利 <span class="${cls}">NT$${Math.round(profitPerUnit).toLocaleString()}</span><span style="opacity:0.6;font-size:11px"> /件</span>`
      + `</div>`;
  }

  let html = marginLine(costPerUnitTWD, sellPerUnitTWD, buyCur, sellCur, '原價毛利　');
  if (hasDiscount && discountPrice) {
    const discCostTWD = discountPrice * buyRate + shippingTWD;
    html += marginLine(discCostTWD, sellPerUnitTWD, buyCur, sellCur, '折後毛利　');
  }

  hint.className = 'calc-hint';
  hint.innerHTML = html;
}

async function saveRecord() {
  const editId = document.getElementById('f-edit-id').value;
  const mode = document.getElementById('f-mode').value || '採購紀錄';
  const id = editId || Date.now().toString();
  const existingRec = editId ? records.find(r => r.id === editId) : null;

  const rec = {

    name: document.getElementById('f-name').value,

    currency: document.getElementById('f-currency').value,
    country: document.getElementById('f-country').value,
    city: document.getElementById('f-city').value,
    store: document.getElementById('f-store').value,
    category: document.getElementById('f-category').value,
    type: document.getElementById('f-type').value,
    mode,
    note: document.getElementById('f-note').value,
    qty: document.getElementById('f-qty').value,
    demandQty: document.getElementById('f-demand-qty').value,
    sellPrice: document.getElementById('f-sell-price').value,
    sellCurrency: document.getElementById('f-sell-currency').value,
    shipping: document.getElementById('f-shipping').value,
    shippingInCost: document.getElementById('f-shipping-in-cost').checked,
    hasDiscount: document.getElementById('f-has-discount').checked,
    discountPrice: document.getElementById('f-discount-price').value,
    discountNote: document.getElementById('f-discount-note').value,
    photo: photoData || (existingRec ? existingRec.photo : null),
    status: existingRec ? (existingRec.status || '') : '',
    date: document.getElementById('f-date').value || new Date().toLocaleDateString('zh-TW'),
  };

  // Save to IndexedDB
  await saveRecord_db(rec, photoBlob);

  if (editId) {
    const idx = records.findIndex(r => r.id === editId);
    records[idx] = rec;
  } else {
    records.unshift(rec);
  }

  closeModal('add-modal');
  renderRecords();
  renderCatalog();
  toast('已儲存');
}

function renderRecords() {
  const list = document.getElementById('record-list');
  let filtered = records.filter(r => r.mode !== '暫存目錄');
  if (currentFilter === 'buy') filtered = filtered.filter(r => r.status === 'buy');
  else if (currentFilter === 'bought') filtered = filtered.filter(r => r.status === 'bought');
  else if (currentFilter === 'pass') filtered = filtered.filter(r => r.status === 'pass');
  else if (currentFilter === 'biz') filtered = filtered.filter(r => r.type === '業務');
  else if (currentFilter === 'personal') filtered = filtered.filter(r => r.type === '私人');

  const cityVal = document.getElementById('filter-city')?.value || '';
  const countryVal = document.getElementById('filter-country')?.value || '';
  const storeVal = document.getElementById('filter-store')?.value || '';
  if (cityVal) filtered = filtered.filter(r => r.city === cityVal);
  if (countryVal) filtered = filtered.filter(r => (r.country || '') === countryVal);
  if (storeVal) filtered = filtered.filter(r => (r.store || '') === storeVal);

  filtered = applySort(filtered, 'records');
  populateFilterDropdowns();

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✦</div><div class="empty-text">暫無紀錄</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(r => recordCardHTML(r)).join('');
}

function renderCatalog() {
  const list = document.getElementById('catalog-list');
  let items = records.filter(r => r.mode === '暫存目錄');

  const cityVal = document.getElementById('filter-city-cat')?.value || '';
  const countryVal = document.getElementById('filter-country-cat')?.value || '';
  const storeVal = document.getElementById('filter-store-cat')?.value || '';
  if (cityVal) items = items.filter(r => r.city === cityVal);
  if (countryVal) items = items.filter(r => (r.country || '') === countryVal);
  if (storeVal) items = items.filter(r => (r.store || '') === storeVal);

  items = applySort(items, 'catalog');
  populateFilterDropdowns();

  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">◇</div><div class="empty-text">詢價商品暫存於此</div></div>`;
    return;
  }
  list.innerHTML = items.map(r => recordCardHTML(r, true)).join('');
}

function curSymbol(c) {
  const map = { EUR: '€', RMB: '¥', JPY: '¥', KRW: '₩', USD: '$', TWD: 'NT$' };
  return map[c] || c;
}
function fmtPrice(val, cur) {
  if (!val || !cur) return '';
  const sym = curSymbol(cur);
  const n = parseFloat(val);
  // JPY/KRW: no decimals
  const str = (cur === 'JPY' || cur === 'KRW')
    ? Math.round(n).toLocaleString()
    : n.toLocaleString(undefined, {minimumFractionDigits:0, maximumFractionDigits:2});
  return sym + str;
}
function fmtTWD(val, cur) {
  if (!val || !cur || cur === 'TWD') return '';
  const twd = toTWD(val, cur);
  if (!twd) return '';
  return `≈ NT$${twd.toLocaleString()}`;
}

function recordCardHTML(r, isCatalog = false) {
  const cur = r.currency || '';
  const sellCur = r.sellCurrency || cur;
  const margin = calcMargin(r);
  const discMargin = calcDiscountMargin(r);
  const activeMargin = discMargin !== null ? discMargin : margin;
  const marginCls = activeMargin !== null ? (activeMargin >= 0 ? 'margin-positive' : 'margin-negative') : '';

  // Demand qty
  const qty = parseFloat(r.qty) || 0;
  const demandQty = parseFloat(r.demandQty) || 0;
  const short = demandQty > 0 && qty < demandQty ? demandQty - qty : 0;

  // Price lines
  const hasDisc = r.hasDiscount && r.discountPrice;
  const costPrice = hasDisc ? r.discountPrice : r.price; // effective cost

  const buyLine = r.price ? `
    <div class="card-buy-line ${hasDisc ? 'card-buy-strikethrough' : ''}">
      <span class="card-buy-label">買</span>
      <span>${fmtPrice(r.price, cur)}</span>
      <span class="card-twd">${fmtTWD(r.price, cur)}</span>
    </div>` : '';

  const discPriceLine = hasDisc ? `
    <div class="card-disc-line">
      <span class="card-disc-label">折</span>
      <span class="card-disc-price">${fmtPrice(r.discountPrice, cur)}</span>
      <span class="card-twd">${fmtTWD(r.discountPrice, cur)}</span>
    </div>` : '';

  const qtyLine = (qty || demandQty) ? `
    <div class="card-qty-line">
      <span class="card-qty-label">採購量</span>
      <span>${qty || '—'} 件${demandQty ? ' / ' + demandQty + ' 件' : ''}</span>
      ${short ? `<span class="card-short">還差 ${short} 件</span>` : ''}
    </div>` : '';

  const sellMarginLine = (r.sellPrice || activeMargin !== null) ? `
    <div class="card-sell-line">
      ${r.sellPrice ? `<span><span class="card-sell-label">售</span> ${fmtPrice(r.sellPrice, sellCur)}</span>` : ''}
      ${activeMargin !== null ? `<span class="card-margin-pill ${marginCls}">毛利 ${activeMargin}%</span>` : ''}
    </div>` : '';

  const thumb = r.photo
    ? `<div class="card-thumb"><img src="${r.photo}" alt=""></div>`
    : `<div class="card-thumb card-thumb-empty">◻</div>`;

  const statusBtns = !isCatalog ? `
    <div class="card-status-row">
      <button class="status-btn s-buy ${r.status==='buy'?'active':''}" onclick="setStatus('${r.id}','buy',this)">要買</button>
      <button class="status-btn s-bought ${r.status==='bought'?'active':''}" onclick="setStatus('${r.id}','bought',this)">已買</button>
      <button class="status-btn s-pass ${r.status==='pass'?'active':''}" onclick="setStatus('${r.id}','pass',this)">放棄</button>
    </div>` : '';

  // info box: name + tags + note
  const tagsInner = [
    r.category ? `<span class="tag tag-cat">${r.category}</span>` : '',
    r.type === '業務' ? `<span class="tag tag-biz">業務</span>` : r.type === '私人' ? `<span class="tag tag-personal">私人</span>` : '',
    r.hasDiscount ? `<span class="tag tag-discount">有折扣</span>` : '',
    isCatalog ? `<span class="tag tag-catalog">目錄</span>` : '',
  ].filter(Boolean).join('');

  const infoBox = `
    <div class="card-info-box">
      <div class="card-name">${r.name || '（未命名）'}</div>
      ${tagsInner ? `<div class="card-tags-row">${tagsInner}</div>` : ''}
      ${r.note ? `<div style="font-size:11px;color:var(--light);font-style:italic">${r.note}</div>` : ''}
    </div>`;

  // data grid rows: 3-col (label | value | twd)
  const twd_buy = fmtTWD(r.price, cur);
  const twd_disc = hasDisc ? fmtTWD(r.discountPrice, cur) : '';
  const twd_sell = r.sellPrice ? fmtTWD(r.sellPrice, sellCur) : '';

  const buyRow = r.price ? `
    <div class="card-lbl">買</div>
    <div class="${hasDisc ? 'card-val-strike' : 'card-val'}">${fmtPrice(r.price, cur)}${twd_buy ? `<span class="card-twd">${twd_buy}</span>` : ''}</div>` : '';

  const discRow = hasDisc ? `
    <div class="card-lbl">折</div>
    <div class="card-disc-val">${fmtPrice(r.discountPrice, cur)}${twd_disc ? `<span class="card-twd" style="font-size:12px">${twd_disc}</span>` : ''}</div>` : '';

  const buyQtyRow = qty ? `
    <div class="card-lbl">量</div>
    <div class="card-val" style="color:var(--mid)">${qty} 件${short ? `<span class="card-short">還差 ${short} 件</span>` : ''}</div>` : '';

  const sellRow = r.sellPrice ? `
    <div class="card-lbl">售</div>
    <div class="card-val">${fmtPrice(r.sellPrice, sellCur)}${twd_sell ? `<span class="card-twd">${twd_sell}</span>` : ''}</div>` : '';

  const marginRow = activeMargin !== null ? `
    <div class="card-lbl"></div>
    <div><span class="card-margin-pill ${marginCls}">毛利 ${activeMargin}%</span></div>` : '';

  const hasGrid = r.price || r.sellPrice || qty;

  return `<div class="record-card" id="card-${r.id}">
    <div class="card-header">
      ${thumb}
      <div class="card-header-info">
        <div class="card-meta" style="margin-top:4px">${[r.country, r.city].filter(Boolean).join('・') || ''}${r.date ? '　' + r.date : ''}</div>
      </div>
      <div class="card-top-actions">
        <button class="btn-edit-icon" onclick="openAddModal('${r.id}')" title="編輯">✎</button>
        <button class="btn-del-icon" onclick="deleteRecord('${r.id}')">刪</button>
      </div>
    </div>
    ${infoBox}
    ${hasGrid ? `<div class="card-body"><div class="card-data-grid">${buyRow}${discRow}${buyQtyRow}${sellRow}${marginRow}</div></div>` : ''}
    ${!isCatalog ? `
    <div class="card-status-bar">
      <button class="status-btn s-buy ${r.status==='buy'?'active':''}" onclick="setStatus('${r.id}','buy',this)">要買</button>
      <button class="status-btn s-bought ${r.status==='bought'?'active':''}" onclick="setStatus('${r.id}','bought',this)">已買</button>
      <button class="status-btn s-pass ${r.status==='pass'?'active':''}" onclick="setStatus('${r.id}','pass',this)">放棄</button>
    </div>` : `
    <div class="card-footer-actions">
      <button class="rec-btn catalog-convert-btn" onclick="convertCatalog('${r.id}')">→ 採購</button>
    </div>`}
  </div>`;
}

async function setStatus(id, status, btn) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  rec.status = rec.status === status ? '' : status;
  const recNoPhoto = { ...rec }; delete recNoPhoto.photo;
  await dbPut('records', recNoPhoto);
  const card = document.getElementById('card-' + id);
  if (card) {
    card.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    if (rec.status) card.querySelector('.s-' + rec.status)?.classList.add('active');
  }
}

async function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  await deleteRecord_db(id);
  renderRecords();
  renderCatalog();
  toast('已刪除');
}

async function convertCatalog(id) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  rec.mode = '採購紀錄';
  const recNoPhoto = { ...rec }; delete recNoPhoto.photo;
  await dbPut('records', recNoPhoto);
  renderCatalog();
  renderRecords();
  toast('已移至採購紀錄');
}

function toggleSortDir(page) {
  sortDirs[page] = sortDirs[page] === 'desc' ? 'asc' : 'desc';
  const btn = document.getElementById('sort-dir-' + page);
  if (btn) { btn.className = 'sort-dir ' + sortDirs[page]; }
  if (page === 'records') renderRecords();
  else renderCatalog();
}

function getSortValue(r, field) {
  const buyRate = rates[r.currency] || 1;
  switch(field) {
    case 'price': return (parseFloat(r.price) || 0) * buyRate;
    case 'margin': return calcMargin(r) ?? -999;
    case 'qty': return parseFloat(r.qty) || 0;
    case 'shipping': return (parseFloat(r.shipping) || 0) * buyRate;
    case 'date': default: return r.id || '0';
  }
}

function applySort(list, pageId) {
  const field = document.getElementById('sort-field-' + pageId)?.value || 'date';
  const dir = sortDirs[pageId] || 'desc';
  return [...list].sort((a, b) => {
    const va = getSortValue(a, field);
    const vb = getSortValue(b, field);
    if (va < vb) return dir === 'asc' ? -1 : 1;
    if (va > vb) return dir === 'asc' ? 1 : -1;
    return 0;
  });
}

function populateFilterDropdowns() {
  const cities    = [...new Set(records.map(r => r.city).filter(Boolean))].sort();
  const countries = [...new Set(records.map(r => r.country).filter(Boolean))].sort();
  const stores    = [...new Set(records.map(r => r.store).filter(Boolean))].sort();

  const fill = (id, label, list) => {
    const el = document.getElementById(id);
    if (!el) return;
    const cur = el.value;
    el.innerHTML = `<option value="">${label}</option>`
      + list.map(v => `<option value="${v}" ${v===cur?'selected':''}>${v}</option>`).join('');
  };
  fill('filter-city',        '所有城市', cities);
  fill('filter-city-cat',    '所有城市', cities);
  fill('filter-country',     '所有國家', countries);
  fill('filter-country-cat', '所有國家', countries);
  fill('filter-store',       '所有店名', stores);
  fill('filter-store-cat',   '所有店名', stores);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderRecords();
}

function debugInventory() {
  const recs = records.filter(r => r.mode !== '暫存目錄');
  const el = document.getElementById('debug-inv');
  let out = `全部紀錄: ${recs.length} 筆\n`;
  out += `業務紀錄: ${recs.filter(r=>r.type==='業務').length} 筆\n`;
  out += `業務已買: ${recs.filter(r=>r.type==='業務'&&r.status==='bought').length} 筆\n\n`;
  recs.filter(r=>r.type==='業務'&&r.status==='bought').forEach(r => {

  });

}

function renderSummary() {
  const recs = records.filter(r => r.mode !== '暫存目錄');

  // 全部業務 / 全部私人（不管狀態）
  const bizRecs      = recs.filter(r => r.type === '業務' && r.price && r.currency);
  const personalRecs = recs.filter(r => r.type === '私人' && r.price && r.currency);

  function calcTotal(arr) {
    let twd = 0;
    const byCur = {};
    arr.forEach(r => {
      const p = parseFloat(r.price) || 0;
      byCur[r.currency] = (byCur[r.currency] || 0) + p;
      twd += toTWD(r.price, r.currency) || 0;
    });
    return { byCur, twd };
  }

  const bizTotal      = calcTotal(bizRecs);
  const personalTotal = calcTotal(personalRecs);

  // 合計 = 業務已買 + 私人已買
  const bizBoughtTWD      = calcTotal(bizRecs.filter(r => r.status === 'bought')).twd;
  const personalBoughtTWD = calcTotal(personalRecs.filter(r => r.status === 'bought')).twd;
  const grandTWD          = bizBoughtTWD + personalBoughtTWD;

  function renderBlock(title, data, count) {
    const curRows = Object.entries(data.byCur).map(([c, v]) => {
      const twdEq = c !== 'TWD' ? ` <span style="font-size:11px;color:var(--gold)">≈ NT$${Math.round(v * (rates[c]||1)).toLocaleString()}</span>` : '';
      return `<div class="summary-row">
        <span>${curSymbol(c)}${c==='JPY'||c==='KRW' ? Math.round(v).toLocaleString() : v.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:2})}</span>
        <span class="summary-amount" style="font-size:13px">${twdEq}</span>
      </div>`;
    }).join('');
    const divider = Object.keys(data.byCur).length > 0 ? `<div style="border-top:1px solid var(--divider);margin:6px 0"></div>` : '';
    return `<div class="summary-card">
      <div class="summary-card-title">${title} <span style="font-size:12px;color:var(--light)">(${count} 件)</span></div>
      ${curRows}
      ${divider}
      <div class="summary-row">
        <span style="font-weight:500">合計</span>
        <span class="summary-amount" style="color:var(--gold);font-size:20px">NT$${Math.round(data.twd).toLocaleString()}</span>
      </div>
    </div>`;
  }

  const statusCount = {
    buy:    recs.filter(r => r.status === 'buy').length,
    bought: recs.filter(r => r.status === 'bought').length,
    pass:   recs.filter(r => r.status === 'pass').length,
  };

  // 庫存壓力：業務 + 採購 > 需求
  const invItems = [];
  recs.forEach(r => {
    if (r.type !== '業務') return;
    const bought = parseFloat(r.qty) || 0;
    const demand = parseFloat(r.demandQty) || 0;
    if (bought <= 0 || demand <= 0 || bought <= demand) return;
    const excess = bought - demand;
    const useDiscount = r.hasDiscount && r.discountPrice && parseFloat(r.discountPrice) > 0;
    const costPerUnit = useDiscount ? parseFloat(r.discountPrice) : (parseFloat(r.price) || 0);
    const cur = r.currency || '';
    const unitTWD = Math.round(costPerUnit * (rates[cur] || 1));
    const totalTWD = unitTWD * excess;
    invItems.push({ r, bought, demand, excess, costPerUnit, cur, unitTWD, totalTWD, useDiscount });
  });

  const invTotalTWD = invItems.reduce((s, i) => s + i.totalTWD, 0);
  const invTotalQty = invItems.reduce((s, i) => s + i.excess, 0);

  const invBlock = invItems.length > 0 ? `
    <div class="summary-card" style="border-left:3px solid var(--accent)">
      <div class="summary-card-title">庫存壓力
        <span style="font-size:11px;color:var(--light)">（僅計算業務）</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:8px">
        <thead>
          <tr style="color:var(--light);letter-spacing:1px;font-size:10px;border-bottom:1px solid var(--divider)">
            <th style="text-align:left;padding:4px 0;font-weight:400">品項</th>
            <th style="text-align:center;padding:4px 4px;font-weight:400">採購</th>
            <th style="text-align:center;padding:4px 4px;font-weight:400">需求</th>
            <th style="text-align:center;padding:4px 4px;font-weight:400">超出</th>
            <th style="text-align:right;padding:4px 0;font-weight:400">金額/件</th>
            <th style="text-align:right;padding:4px 0;font-weight:400">小計</th>
          </tr>
        </thead>
        <tbody>
          ${invItems.map(i => `
          <tr style="border-bottom:1px solid var(--divider)">
            <td style="padding:6px 0;color:var(--dark)">
              ${i.r.name || '未命名'}
              ${i.r.status === 'bought' ? '<span style="font-size:9px;background:var(--status-bought);color:white;padding:1px 5px;border-radius:8px;margin-left:4px">已買</span>' : i.r.status === 'buy' ? '<span style="font-size:9px;background:var(--status-buy);color:white;padding:1px 5px;border-radius:8px;margin-left:4px">要買</span>' : ''}
            </td>
            <td style="text-align:center;padding:6px 4px;color:var(--mid)">${i.bought}</td>
            <td style="text-align:center;padding:6px 4px;color:var(--mid)">${i.demand}</td>
            <td style="text-align:center;padding:6px 4px">
              <span style="background:var(--status-pass);color:white;font-size:10px;padding:1px 6px;border-radius:10px">${i.excess}</span>
            </td>
            <td style="text-align:right;padding:6px 0;color:var(--mid)">
              ${fmtPrice(i.costPerUnit, i.cur)}${i.useDiscount ? ' <span style="font-size:10px;color:var(--gold)">折</span>' : ''}
            </td>
            <td style="text-align:right;padding:6px 0;font-weight:500;color:var(--accent)">NT$${i.totalTWD.toLocaleString()}</td>
          </tr>`).join('')}
        </tbody>
      </table>
      <div class="summary-row">
        <span style="font-weight:500">庫存總件數</span>
        <span class="summary-amount" style="color:var(--accent)">${invTotalQty} 件</span>
      </div>
      <div class="summary-row" style="border-top:1px solid var(--divider);padding-top:8px;margin-top:4px">
        <span style="font-weight:500">庫存總額</span>
        <span class="summary-amount" style="color:var(--accent);font-size:20px">NT$${invTotalTWD.toLocaleString()}</span>
      </div>
    </div>` : `
    <div class="summary-card" style="border-left:3px solid var(--status-buy)">
      <div class="summary-card-title">庫存壓力</div>
      <div class="summary-row"><span style="color:var(--status-buy)">✓ 無庫存壓力</span></div>
    </div>`;

  document.getElementById('summary-content').innerHTML = `
    <div class="summary-card">
      <div class="summary-card-title">今日狀態</div>
      <div class="summary-row"><span>要買</span><span class="summary-amount" style="color:var(--status-buy)">${statusCount.buy} 件</span></div>
      <div class="summary-row"><span>已買</span><span class="summary-amount" style="color:var(--status-bought)">${statusCount.bought} 件</span></div>
      <div class="summary-row"><span>放棄</span><span class="summary-amount" style="color:var(--status-pass)">${statusCount.pass} 件</span></div>
    </div>
    ${invBlock}
    ${renderBlock('業務花費', bizTotal, bizRecs.length)}
    ${renderBlock('私人花費', personalTotal, personalRecs.length)}
    <div class="summary-card" style="border-top:2px solid var(--gold)">
      <div class="summary-card-title">已買合計</div>
      <div class="summary-row"><span>業務已買</span><span class="summary-amount">NT$${Math.round(bizBoughtTWD).toLocaleString()}</span></div>
      <div class="summary-row"><span>私人已買</span><span class="summary-amount">NT$${Math.round(personalBoughtTWD).toLocaleString()}</span></div>
      <div style="border-top:1px solid var(--divider);margin:6px 0"></div>
      <div class="summary-row">
        <span style="font-weight:500">總計</span>
        <span class="summary-amount" style="color:var(--gold);font-size:22px">NT$${Math.round(grandTWD).toLocaleString()}</span>
      </div>
    </div>
  `;
}


// ── JSON 備份匯出 ──
async function exportJSON() {
  // 從 IndexedDB 讀取含照片的完整資料
  const fullRecords = await new Promise((resolve, reject) => {
    const tx = db.transaction('records', 'readonly');
    const store = tx.objectStore('records');
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });

  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    rates: rates,
    records: fullRecords,
  };

  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `採購手帳備份_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('備份已匯出');
}

// ── JSON 備份匯入（合併，不覆蓋已存在的 id）──
async function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  let payload;
  try {
    payload = JSON.parse(text);
  } catch {
    toast('檔案格式錯誤'); return;
  }
  if (!payload.records || !Array.isArray(payload.records)) {
    toast('無效的備份檔'); return;
  }

  const existingIds = new Set(records.map(r => r.id));
  let added = 0;

  for (const rec of payload.records) {
    if (!rec.id) continue;
    if (existingIds.has(rec.id)) continue; // 跳過已存在的
    // 存照片（含 photo 欄位）
    await dbPut('records', rec);
    // 存 metadata（不含照片）
    const recNoPhoto = { ...rec }; delete recNoPhoto.photo;
    records.unshift(rec);
    added++;
  }

  // 匯入匯率設定（若備份有）
  if (payload.rates) {
    Object.assign(rates, payload.rates);
    await dbPut('settings', { key: 'rates', value: rates });
    loadRatesUI();
  }

  renderRecords();
  renderCatalog();
  input.value = '';
  toast(`已匯入 ${added} 筆新紀錄`);
}

// Batch currency
function openBatchCurrencyModal() {
  const noCurrency = records.filter(r => !r.currency);
  const list = document.getElementById('batch-list');
  batchSelections = {};
  if (!noCurrency.length) {
    list.innerHTML = `<p style="font-size:12px;color:var(--light);letter-spacing:1.5px">所有紀錄均已填幣別</p>`;
  } else {
    list.innerHTML = noCurrency.map(r => `
      <div class="batch-item">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="bsel-${r.id}" onchange="toggleBatchSel('${r.id}',this)">
          <span>${r.name || '（未命名）'} — ${r.price || '無價格'} — ${r.date || ''}</span>
        </label>
      </div>`).join('');
  }
  document.getElementById('batch-currency-modal').classList.add('open');
}

function toggleBatchSel(id, cb) {
  if (cb.checked) batchSelections[id] = true;
  else delete batchSelections[id];
}

async function applyBatchCurrency() {
  const cur = document.getElementById('batch-currency').value;
  for (const id of Object.keys(batchSelections)) {
    const rec = records.find(r => r.id === id);
    if (rec) {
      rec.currency = cur;
      const recNoPhoto = { ...rec }; delete recNoPhoto.photo;
      await dbPut('records', recNoPhoto);
    }
  }
  renderRecords();
  closeModal('batch-currency-modal');
  toast(`已套用 ${cur}`);
}

// Batch status
function openBatchModal() {
  const recs = records.filter(r => r.mode !== '暫存目錄');
  const list = document.getElementById('batch-status-list');
  list.innerHTML = recs.map(r => `
    <div class="batch-item">
      <span style="flex:1">${r.name || '（未命名）'} ${r.price ? r.price + (r.currency||'') : ''}</span>
      <div style="display:flex;gap:4px">
        <button class="status-btn s-buy ${r.status==='buy'?'active':''}" onclick="batchSetStatus('${r.id}','buy',this)">要買</button>
        <button class="status-btn s-bought ${r.status==='bought'?'active':''}" onclick="batchSetStatus('${r.id}','bought',this)">已買</button>
        <button class="status-btn s-pass ${r.status==='pass'?'active':''}" onclick="batchSetStatus('${r.id}','pass',this)">放棄</button>
      </div>
    </div>`).join('') || '<p style="font-size:12px;color:var(--light)">暫無紀錄</p>';
  document.getElementById('batch-modal').classList.add('open');
}

function batchSetStatus(id, status, btn) {
  const rec = records.find(r => r.id === id);
  if (!rec) return;
  rec.status = rec.status === status ? '' : status;
  const parent = btn.closest('.batch-item');
  parent.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
  if (rec.status) btn.classList.add('active');
}

async function saveBatchStatus() {
  for (const rec of records) {
    const recNoPhoto = { ...rec }; delete recNoPhoto.photo;
    await dbPut('records', recNoPhoto);
  }
  renderRecords();
  closeModal('batch-modal');
  toast('已儲存標記');
}

// CSV export
function exportCSV(type) {
  let data = records.filter(r => r.mode !== '暫存目錄');
  let filename = '採購紀錄';
  if (type === 'biz') { data = data.filter(r => r.type === '業務'); filename = '業務採購'; }
  if (type === 'personal') { data = data.filter(r => r.type === '私人'); filename = '私人採購'; }

  const headers = ['日期','商品名稱','數量','採購價','幣別','採購價(TWD)','售價(TWD)','毛利率(%)','運費(TWD)','城市','店名','分類','用途','狀態','有折扣','折後價','折扣備註','備註'];
  const rows = data.map(r => [
    r.date || '', r.name || '', r.qty || '', r.price || '', r.currency || '',
    toTWD(r.price, r.currency) || '', r.sellPrice || '', calcMargin(r) !== null ? calcMargin(r) : '',
    r.shipping || '', r.city || '', r.store || '', r.category || '', r.type || '', r.status || '',
    r.hasDiscount ? '是' : '否', r.discountPrice || '', r.discountNote || '', r.note || ''
  ]);

  const csv = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\ufeff';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV 匯出完成');
}

async function exportExcel(type) {
  // Load SheetJS if not already loaded
  if (!window.XLSX) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  let data = records.filter(r => r.mode !== '暫存目錄');
  let filename = '採購紀錄';
  if (type === 'biz') { data = data.filter(r => r.type === '業務'); filename = '業務採購'; }
  if (type === 'personal') { data = data.filter(r => r.type === '私人'); filename = '私人採購'; }

  toast('準備匯出中...');

  const wb = XLSX.utils.book_new();
  const wsData = [
    ['日期','商品名稱','照片','數量','採購價','幣別','採購價(TWD)','售價(TWD)','毛利率(%)','運費(TWD)','城市','店名','分類','用途','狀態','有折扣','折後價','折扣備註','備註']
  ];

  for (const r of data) {
    wsData.push([
      r.date || '', r.name || '', r.photo ? '(見圖)' : '', r.qty || '',
      r.price || '', r.currency || '', toTWD(r.price, r.currency) || '',
      r.sellPrice || '', calcMargin(r) !== null ? calcMargin(r) : '',
      r.shipping || '', r.city || '', r.store || '', r.category || '',
      r.type || '', r.status || '',
      r.hasDiscount ? '是' : '否', r.discountPrice || '', r.discountNote || '', r.note || ''
    ]);
  }

  const ws = XLSX.utils.aoa_to_sheet(wsData);

  // Set column widths
  ws['!cols'] = [
    {wch:10},{wch:20},{wch:12},{wch:6},{wch:10},{wch:6},{wch:12},{wch:12},{wch:8},
    {wch:10},{wch:10},{wch:16},{wch:10},{wch:6},{wch:6},{wch:6},{wch:10},{wch:16},{wch:30}
  ];

  // Embed photos as images using row height + drawingml approach
  // We'll use a simpler approach: convert photos to base64 and add as separate sheet
  const photoRecs = data.filter(r => r.photo);
  if (photoRecs.length > 0) {
    // Add photos to a second sheet as references
    const photoData2 = [['商品名稱', '日期', '城市', '店名', '價格', '備註', '照片 (Base64 預覽)']];
    for (const r of photoRecs) {
      let b64 = '';
      try {
        // Convert blob URL to base64
        const resp = await fetch(r.photo);
        const blob = await resp.blob();
        b64 = await new Promise(res => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result);
          reader.readAsDataURL(blob);
        });
      } catch(e) { b64 = r.photo || ''; }
      photoData2.push([r.name || '(未命名)', r.date || '', r.city || '', r.store || '',
        (r.price || '') + ' ' + (r.currency || ''), r.note || '', b64.substring(0, 100) + '...']);
    }
    const ws2 = XLSX.utils.aoa_to_sheet(photoData2);
    XLSX.utils.book_append_sheet(wb, ws2, '照片清單');

    // Also create an HTML file with embedded photos for download
    let htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>${filename} 照片總覽</title>
<style>
body{font-family:sans-serif;background:#f5f0e8;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.card{background:white;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.card img{width:100%;height:160px;object-fit:cover}
.card-info{padding:10px;font-size:12px}
.card-name{font-weight:bold;margin-bottom:4px}
.card-meta{color:#888}
</style></head><body>
<h2 style="color:#2a2218;letter-spacing:3px;margin-bottom:20px">${filename} · 照片總覽</h2>
<div class="grid">`;

    for (const r of photoRecs) {
      let b64 = r.photo;
      try {
        const resp = await fetch(r.photo);
        const blob = await resp.blob();
        b64 = await new Promise(res => {
          const reader = new FileReader();
          reader.onload = e => res(e.target.result);
          reader.readAsDataURL(blob);
        });
      } catch(e) {}
      htmlContent += `<div class="card">
        <img src="${b64}" alt="${r.name || ''}">
        <div class="card-info">
          <div class="card-name">${r.name || '(未命名)'}</div>
          <div class="card-meta">${r.price ? r.price + ' ' + (r.currency||'') : ''} ${r.city ? '· ' + r.city : ''} ${r.store ? r.store : ''}</div>
          <div class="card-meta">${r.note || ''}</div>
        </div>
      </div>`;
    }
    htmlContent += `</div></body></html>`;

    // Download photo HTML
    const htmlBlob = new Blob([htmlContent], {type: 'text/html;charset=utf-8'});
    const htmlUrl = URL.createObjectURL(htmlBlob);
    const ha = document.createElement('a');
    ha.href = htmlUrl;
    ha.download = `${filename}_照片_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.html`;
    ha.click();
    URL.revokeObjectURL(htmlUrl);
  }

  XLSX.utils.book_append_sheet(wb, ws, '採購紀錄');
  const dateStr = new Date().toLocaleDateString('zh-TW').replace(/\//g,'-');
  XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const xlsxBlob = new Blob([XLSX.write(wb, {bookType:'xlsx', type:'array'})], {type:'application/octet-stream'});
  const url = URL.createObjectURL(xlsxBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${filename}_${dateStr}.xlsx`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Excel 匯出完成！照片另存為 HTML 檔');
}

async function clearAll() {
  if (confirm('確定要清除所有資料？')) {
    records = [];
    await dbClear('records');
    await dbClear('photos');
    renderRecords();
    renderCatalog();
    toast('已清除');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
